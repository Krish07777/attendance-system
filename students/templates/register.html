<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 320px;">
    <h4 class="text-center mb-3">Sign Up</h4>

    <form method="post">
        {% csrf_token %}

        <!-- Username -->
        <input type="text" name="username" class="form-control mb-2" placeholder="Username">

        <!-- Password -->
        <div class="input-group mb-2">
            <input type="password" id="password" name="password" class="form-control" placeholder="Password">
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password','eye1')">
                <i id="eye1" class="fa fa-eye"></i>
            </button>
        </div>

        <!-- Confirm Password -->
        <div class="input-group mb-3">
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Confirm Password">
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirm_password','eye2')">
                <i id="eye2" class="fa fa-eye"></i>
            </button>
        </div>

        <button class="btn btn-success w-100">Register</button>
    </form>

    {% if error %}
    <p class="text-danger mt-2">{{ error }}</p>
    {% endif %}

    <p class="mt-2 text-center">
        Already have account? <a href="/">Login</a>
    </p>
</div>

<!-- JS -->
<script>
function togglePassword(fieldId, iconId) {
    let field = document.getElementById(fieldId);
    let icon = document.getElementById(iconId);

    if (field.type === "password") {
        field.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        field.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

</body>
</html>
