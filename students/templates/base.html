{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Attendance System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- ✅ Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* 🔥 GLOBAL FONT */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #fbfcff, #eef4ff);
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-weight: 600;
        }

        .navbar {
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        .navbar-brand {
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 🔥 LOGO STYLE */
        .logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-right: 10px;
            border-radius: 10px;
            background: white;
            padding: 3px;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            width: 220px;
            position: fixed;
            top: 0;
            left: -220px;
            background: #212529;
            padding-top: 60px;
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #343a40;
        }

        /* CONTENT */
        .content {
            margin-left: 0;
            padding: 20px;
            transition: 0.3s;
        }

        .content.shift {
            margin-left: 220px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .content.shift {
                margin-left: 0;
            }
        }

        .card {
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .btn {
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.08);
        }

        footer {
            background: rgba(0,0,0,0.8);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <div class="d-flex align-items-center">
        <button class="btn btn-outline-light me-3" onclick="toggleSidebar()">☰</button>

        <img src="{% static 'images/logo.png' %}" class="logo">

        <span class="navbar-brand mb-0 fs-5">
            FUTURENOVA UNIVERSITY
        </span>
    </div>

    <div>
        <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <a href="/dashboard/">🏠 Dashboard</a>
    <a href="{% url 'mark' %}">📝 Mark Attendance</a>
    <a href="/view/">📄 Report</a>
</div>

<!-- CONTENT -->
<div id="content" class="content flex-grow-1" data-aos="fade-up">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer class="text-white text-center py-3 mt-auto">
    <p class="mb-1">© 2026 FUTURENOVA UNIVERSITY</p>
    <p class="mb-0">Developed by KRISH Singh</p>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
  AOS.init({
    duration: 800,
    once: true
  });

  function toggleSidebar() {
      let sidebar = document.getElementById("sidebar");
      let content = document.getElementById("content");

      sidebar.classList.toggle("active");
      content.classList.toggle("shift");
  }
</script>

</body>
</html>
