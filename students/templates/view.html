{% extends 'base.html' %}

{% block content %}

<h3 class="mb-4">📊 Attendance Report</h3>

<div class="row">
    {% for item in data %}
    <div class="col-md-4">
        <div class="card shadow p-3 mb-3 text-center">
            <h5>{{ item.name }}</h5>
            <h3 class="text-success">{{ item.percentage }}%</h3>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
