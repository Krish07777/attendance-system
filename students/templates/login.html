{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 🎬 VIDEO BACKGROUND */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* 🌑 DARK OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        /* CENTER FIX */
        .center-box {
            position: relative;
            z-index: 1;
        }

        /* ✨ LOGIN CARD */
        .login-card {
            width: 320px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease;
        }

        /* ✨ ANIMATION */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(40px);}
            to {opacity: 1; transform: translateY(0);}
        }

        /* BUTTON EFFECT */
        .btn-primary {
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<!-- 🎬 VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="{% static 'images/videos/videos.mp4' %}" type="video/mp4">
</video>

<!-- LOGIN BOX -->
<div class="d-flex justify-content-center align-items-center vh-100 center-box">

    <div class="card p-4 login-card" data-aos="zoom-in">

        <h4 class="text-center mb-3">🔐 Login</h4>

        <form method="post">
            {% csrf_token %}

            <input type="text" name="username" class="form-control mb-2" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <p class="mt-3 text-center">
            Don't have account? 
            <a href="/register/" class="fw-bold text-primary">Sign Up</a>
        </p>

        {% if error %}
        <p class="text-danger mt-2 text-center">{{ error }}</p>
        {% endif %}

    </div>

</div>

<!-- Animation Script -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 1000
    });
</script>

</body>
</html>
