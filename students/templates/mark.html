{% extends 'base.html' %}

{% block content %}

<h3 class="mb-4">📅 Mark Attendance</h3>

<form method="post" class="card p-4 shadow">
    {% csrf_token %}

    <table class="table">
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Present</th>
            </tr>
        </thead>

        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>
                    <input type="checkbox" name="{{ student.id }}">
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <button class="btn btn-primary">Submit Attendance</button>
</form>

{% endblock %}
